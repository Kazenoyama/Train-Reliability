<app-filter-bar (filtersChanged)="onFiltersChanged($event)"></app-filter-bar>

<div class="list-header" *ngIf="trains.length > 0">
  <span>{{ trains.length }} résultat{{ trains.length > 1 ? 's' : '' }} chargé{{ trains.length > 1 ? 's' : '' }}</span>
  <mat-icon>leaderboard</mat-icon>
</div>

<div class="ranking-container"
     infiniteScroll
     [infiniteScrollDistance]="2"
     [infiniteScrollThrottle]="300"
     [scrollWindow]="true"
     (scrolled)="onScroll()">

  <app-train-row
    *ngFor="let item of trains; let i = index; trackBy: trackById"
    [train]="item"
    [rank]="i + 1">
  </app-train-row>

  <div class="loading-indicator" *ngIf="isLoading">
    <mat-spinner diameter="36"></mat-spinner>
    <span>Chargement...</span>
  </div>

  <div class="end-of-list" *ngIf="isLastPage && !isLoading && trains.length > 0">
    <mat-icon>check_circle</mat-icon>
    Tous les résultats sont affichés
  </div>

  <div class="no-results" *ngIf="!isLoading && trains.length === 0">
    <mat-icon>search_off</mat-icon>
    <p>Aucun résultat pour ces filtres</p>
  </div>

</div>
